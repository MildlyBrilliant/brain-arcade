<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Rocket Game | Brain Arcade</title>

  <style>
    :root {
      --yellow: #ffe66d;
      --deep: #15002f;
      --glass: rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f1eff, #03000f 70%, #000);
      color: white;
      touch-action: none;
      overscroll-behavior: none;
    }

    #game {
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    #rocket {
      position: absolute;
      font-size: clamp(38px, 8vw, 52px);
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      transition: transform 0.12s;
      pointer-events: none;
    }

    .star, .asteroid {
      position: absolute;
      font-size: clamp(28px, 6vw, 38px);
      pointer-events: none;
    }

    #hud {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      z-index: 10;
      background: var(--glass);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: clamp(14px, 3.5vw, 18px);
      line-height: 1.45;
      backdrop-filter: blur(8px);
    }

    #gameOver {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 30;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    #gameOverBox {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      padding: 30px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    button, a {
      display: inline-block;
      margin: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: var(--yellow);
      color: var(--deep);
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      font-size: 16px;
    }

    #instructions {
      position: fixed;
      bottom: calc(120px + env(safe-area-inset-bottom));
      left: 15px;
      right: 15px;
      z-index: 10;
      opacity: 0.85;
      font-size: clamp(13px, 3.5vw, 15px);
      text-align: center;
      pointer-events: none;
    }

    #touchControls {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 15;
      display: grid;
      grid-template-columns: 58px 58px 58px;
      grid-template-rows: 58px 58px 58px;
      gap: 8px;
      opacity: 0.88;
    }

    .control-btn {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      margin: 0;
      padding: 0;
      font-size: 26px;
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);
    }

    .control-btn:active {
      background: var(--yellow);
      color: var(--deep);
      transform: scale(0.96);
    }

    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
    .down { grid-column: 2; grid-row: 3; }

    #tapHint {
      position: fixed;
      left: max(14px, env(safe-area-inset-left));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 12;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      max-width: 230px;
      opacity: 0.85;
    }

    @media (hover: hover) and (pointer: fine) {
      #touchControls,
      #tapHint {
        display: none;
      }

      #instructions {
        bottom: 15px;
        text-align: left;
      }
    }

    @media (max-width: 520px) {
      #touchControls {
        grid-template-columns: 52px 52px 52px;
        grid-template-rows: 52px 52px 52px;
      }

      .control-btn {
        width: 52px;
        height: 52px;
        font-size: 23px;
      }

      #tapHint {
        max-width: 170px;
      }
    }
  </style>
</head>

<body>

<div id="game">
  <div id="hud">
    ⭐ Score: <span id="score">0</span><br>
    🏆 Best: <span id="best">0</span><br>
    ❤️ Lives: <span id="lives">3</span>
  </div>

  <div id="rocket">🚀</div>

  <div id="instructions">
    Keyboard: Arrow keys or WASD. Touchscreen: drag/tap the screen or use the buttons.
  </div>

  <div id="tapHint">Touch anywhere to guide the rocket.</div>

  <div id="touchControls" aria-label="Touch controls">
    <button class="control-btn up" data-control="up" aria-label="Move up">▲</button>
    <button class="control-btn left" data-control="left" aria-label="Move left">◀</button>
    <button class="control-btn right" data-control="right" aria-label="Move right">▶</button>
    <button class="control-btn down" data-control="down" aria-label="Move down">▼</button>
  </div>

  <div id="gameOver">
    <div id="gameOverBox">
      <h1>Game Over</h1>
      <p>Your final score was <strong id="finalScore">0</strong>.</p>
      <button onclick="restartGame()">Play Again</button>
      <a href="space.html">Back to Space Zone</a>
    </div>
  </div>
</div>

<script>
  const game = document.getElementById("game");
  const rocket = document.getElementById("rocket");
  const scoreText = document.getElementById("score");
  const bestText = document.getElementById("best");
  const livesText = document.getElementById("lives");
  const gameOverScreen = document.getElementById("gameOver");
  const finalScore = document.getElementById("finalScore");

  let rocketX = 60;
  let rocketY = window.innerHeight / 2;
  let targetX = rocketX;
  let targetY = rocketY;

  let score = 0;
  let highScore = Number(localStorage.getItem("brainArcadeHighScore")) || 0;
  let lives = 3;
  let speed = 5;
  let difficulty = 1;
  let gameRunning = true;

  const keys = {};
  const touchDirections = {
    up: false,
    down: false,
    left: false,
    right: false
  };

  const stars = [];
  const asteroids = [];

  bestText.textContent = highScore;

  document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
  });

  document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
  });

  function setTouchDirection(control, isPressed) {
    if (touchDirections.hasOwnProperty(control)) {
      touchDirections[control] = isPressed;
    }
  }

  document.querySelectorAll(".control-btn").forEach(button => {
    const control = button.dataset.control;

    button.addEventListener("pointerdown", e => {
      e.preventDefault();
      button.setPointerCapture(e.pointerId);
      setTouchDirection(control, true);
    });

    button.addEventListener("pointerup", e => {
      e.preventDefault();
      setTouchDirection(control, false);
    });

    button.addEventListener("pointercancel", () => {
      setTouchDirection(control, false);
    });

    button.addEventListener("pointerleave", () => {
      setTouchDirection(control, false);
    });
  });

  game.addEventListener("pointerdown", moveTargetToPointer);
  game.addEventListener("pointermove", moveTargetToPointer);

  function moveTargetToPointer(e) {
    if (!gameRunning) return;

    if (e.target.closest("#touchControls") || e.target.closest("#gameOverBox")) return;

    targetX = e.clientX;
    targetY = e.clientY;
  }

  function moveRocket() {
    const keyboardOrButtonActive =
      keys["arrowup"] || keys["w"] ||
      keys["arrowdown"] || keys["s"] ||
      keys["arrowleft"] || keys["a"] ||
      keys["arrowright"] || keys["d"] ||
      touchDirections.up ||
      touchDirections.down ||
      touchDirections.left ||
      touchDirections.right;

    if (keys["arrowup"] || keys["w"] || touchDirections.up) rocketY -= speed;
    if (keys["arrowdown"] || keys["s"] || touchDirections.down) rocketY += speed;
    if (keys["arrowleft"] || keys["a"] || touchDirections.left) rocketX -= speed;
    if (keys["arrowright"] || keys["d"] || touchDirections.right) rocketX += speed;

    if (!keyboardOrButtonActive) {
      const dx = targetX - rocketX;
      const dy = targetY - rocketY;
      const distance = Math.hypot(dx, dy);

      if (distance > 8) {
        rocketX += dx * 0.08;
        rocketY += dy * 0.08;
      }
    }

    const rocketSize = rocket.offsetWidth || 52;

    rocketX = Math.max(0, Math.min(window.innerWidth - rocketSize, rocketX));
    rocketY = Math.max(50, Math.min(window.innerHeight - rocketSize, rocketY));

    rocket.style.left = rocketX + "px";
    rocket.style.top = rocketY + "px";
  }

  function createItem(type) {
    const item = document.createElement("div");
    item.className = type;
    item.textContent = type === "star" ? "⭐" : "☄️";
    item.style.left = window.innerWidth + "px";
    item.style.top = Math.random() * (window.innerHeight - 120) + 60 + "px";
    game.appendChild(item);

    const obj = {
      el: item,
      x: window.innerWidth,
      y: parseFloat(item.style.top),
      speed: type === "star" ? 3 : (4 + Math.random() * 3) * difficulty
    };

    if (type === "star") stars.push(obj);
    else asteroids.push(obj);
  }

  function moveItems(list, type) {
    for (let i = list.length - 1; i >= 0; i--) {
      const obj = list[i];
      obj.x -= obj.speed;
      obj.el.style.left = obj.x + "px";

      if (isColliding(rocket, obj.el)) {
        obj.el.remove();
        list.splice(i, 1);

        if (type === "star") {
          score += 10;
          scoreText.textContent = score;

          rocket.style.transform = "scale(1.3)";
          setTimeout(() => rocket.style.transform = "scale(1)", 120);

        } else {
          lives -= 1;
          livesText.textContent = lives;

          rocket.style.transform = "scale(1.4)";
          setTimeout(() => rocket.style.transform = "scale(1)", 150);

          if (lives <= 0) endGame();
        }
      } else if (obj.x < -70) {
        obj.el.remove();
        list.splice(i, 1);
      }
    }
  }

  function isColliding(a, b) {
    const rectA = a.getBoundingClientRect();
    const rectB = b.getBoundingClientRect();

    const padding = 8;

    return !(
      rectA.right - padding < rectB.left + padding ||
      rectA.left + padding > rectB.right - padding ||
      rectA.bottom - padding < rectB.top + padding ||
      rectA.top + padding > rectB.bottom - padding
    );
  }

  function endGame() {
    gameRunning = false;

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("brainArcadeHighScore", highScore);
      bestText.textContent = highScore;
    }

    finalScore.textContent = score;
    gameOverScreen.style.display = "flex";
  }

  function restartGame() {
    location.reload();
  }

  window.addEventListener("resize", () => {
    rocketX = Math.min(rocketX, window.innerWidth - 60);
    rocketY = Math.min(rocketY, window.innerHeight - 60);
    targetX = rocketX;
    targetY = rocketY;
  });

  setInterval(() => {
    if (gameRunning) createItem("star");
  }, 1300);

  setInterval(() => {
    if (gameRunning) createItem("asteroid");
  }, 900);

  setInterval(() => {
    if (gameRunning) difficulty += 0.1;
  }, 3000);

  function gameLoop() {
    if (gameRunning) {
      moveRocket();
      moveItems(stars, "star");
      moveItems(asteroids, "asteroid");
    }

    requestAnimationFrame(gameLoop);
  }

  gameLoop();
</script>

</body>
</html>
