<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match | Brain Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #111827, #312e81, #1e3a8a);
      color: #fff;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 2.8rem;
      margin: 0;
    }

    header p {
      max-width: 720px;
      margin: 14px auto 0;
      color: #dbeafe;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1050px;
      margin: 0 auto;
      padding: 20px;
    }

    .panel {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button, select {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    button {
      background: #facc15;
      color: #111827;
    }

    button.secondary {
      background: #e0e7ff;
      color: #1e3a8a;
    }

    select {
      background: #fff;
      color: #111827;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .stat {
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: bold;
    }

    .game-board {
      display: grid;
      gap: 12px;
      margin: 0 auto;
      max-width: 760px;
    }

    .easy {
      grid-template-columns: repeat(4, 1fr);
    }

    .medium {
      grid-template-columns: repeat(4, 1fr);
    }

    .hard {
      grid-template-columns: repeat(6, 1fr);
    }

    .card {
      aspect-ratio: 1 / 1;
      background: transparent;
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.45s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .card-front {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: 2px solid rgba(255,255,255,0.4);
      font-size: 2rem;
    }

    .card-back {
      background: #ffffff;
      color: #111827;
      transform: rotateY(180deg);
      font-size: clamp(2rem, 6vw, 4rem);
    }

    .card.matched .card-back {
      background: #dcfce7;
    }

    .message {
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      color: #facc15;
      margin-top: 20px;
      min-height: 30px;
    }

    .small-note {
      text-align: center;
      color: #cbd5e1;
      font-size: 0.9rem;
      margin-top: 18px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2.2rem;
      }

      .hard {
        grid-template-columns: repeat(4, 1fr);
      }

      .game-board {
        gap: 8px;
      }

      .card-front,
      .card-back {
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Memory Match</h1>
  <p>Flip the tiles, find the matching pairs, and clear the board. Choose your level, re-mix the tiles, and try to beat your score.</p>
</header>

<main class="wrap">
  <section class="panel">

    <div class="controls">
      <select id="themeSelect">
        <option value="planets">Planets</option>
        <option value="sweets">Sweets</option>
        <option value="animals">Animals</option>
      </select>

      <button class="secondary" onclick="setDifficulty('easy')">Easy</button>
      <button class="secondary" onclick="setDifficulty('medium')">Medium</button>
      <button class="secondary" onclick="setDifficulty('hard')">Hard</button>
      <button onclick="startGame()">Re-mix</button>
    </div>

    <div class="stats">
      <div class="stat">Level: <span id="levelText">Easy</span></div>
      <div class="stat">Moves: <span id="moves">0</span></div>
      <div class="stat">Pairs: <span id="pairs">0</span>/<span id="totalPairs">6</span></div>
      <div class="stat">Time: <span id="timer">0</span>s</div>
    </div>

    <div id="gameBoard" class="game-board easy"></div>

    <div class="message" id="message"></div>

  </section>

  <p class="small-note">Tip: Easy = 12 tiles, Medium = 16 tiles, Hard = 24 tiles.</p>
</main>

<script>
  const themes = {
    planets: ["☀️", "🌍", "🌕", "🪐", "🌌", "☄️", "🚀", "👽", "🛰️", "🌠", "🔭", "⭐"],
    sweets: ["🍬", "🍭", "🍫", "🍩", "🧁", "🍪", "🍰", "🍦", "🍧", "🥞", "🍯", "🍡"],
    animals: ["🐶", "🐱", "🦊", "🐼", "🐸", "🦁", "🐵", "🐧", "🦄", "🐢", "🐙", "🦖"]
  };

  const difficultySettings = {
    easy: 6,
    medium: 8,
    hard: 12
  };

  let difficulty = "easy";
  let firstCard = null;
  let secondCard = null;
  let lockBoard = false;
  let moves = 0;
  let matchedPairs = 0;
  let totalPairs = 6;
  let timer = 0;
  let timerInterval = null;
  let gameStarted = false;

  const board = document.getElementById("gameBoard");
  const movesEl = document.getElementById("moves");
  const pairsEl = document.getElementById("pairs");
  const totalPairsEl = document.getElementById("totalPairs");
  const timerEl = document.getElementById("timer");
  const messageEl = document.getElementById("message");
  const levelText = document.getElementById("levelText");

  function setDifficulty(level) {
    difficulty = level;
    startGame();
  }

  function startGame() {
    clearInterval(timerInterval);

    firstCard = null;
    secondCard = null;
    lockBoard = false;
    moves = 0;
    matchedPairs = 0;
    timer = 0;
    gameStarted = false;

    totalPairs = difficultySettings[difficulty];

    movesEl.textContent = moves;
    pairsEl.textContent = matchedPairs;
    totalPairsEl.textContent = totalPairs;
    timerEl.textContent = timer;
    messageEl.textContent = "";
    levelText.textContent = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);

    board.className = "game-board " + difficulty;
    board.innerHTML = "";

    const selectedTheme = document.getElementById("themeSelect").value;
    const selectedIcons = themes[selectedTheme].slice(0, totalPairs);
    const cards = shuffle([...selectedIcons, ...selectedIcons]);

    cards.forEach(icon => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.icon = icon;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">?</div>
          <div class="card-back">${icon}</div>
        </div>
      `;

      card.addEventListener("click", flipCard);
      board.appendChild(card);
    });
  }

  function flipCard() {
    if (lockBoard) return;
    if (this === firstCard) return;
    if (this.classList.contains("matched")) return;

    if (!gameStarted) {
      startTimer();
      gameStarted = true;
    }

    this.classList.add("flipped");

    if (!firstCard) {
      firstCard = this;
      return;
    }

    secondCard = this;
    moves++;
    movesEl.textContent = moves;

    checkForMatch();
  }

  function checkForMatch() {
    const isMatch = firstCard.dataset.icon === secondCard.dataset.icon;

    if (isMatch) {
      firstCard.classList.add("matched");
      secondCard.classList.add("matched");

      matchedPairs++;
      pairsEl.textContent = matchedPairs;

      resetTurn();

      if (matchedPairs === totalPairs) {
        clearInterval(timerInterval);
        messageEl.textContent = `You cleared the board in ${moves} moves and ${timer} seconds!`;
      }
    } else {
      lockBoard = true;

      setTimeout(() => {
        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");
        resetTurn();
      }, 750);
    }
  }

  function resetTurn() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      timer++;
      timerEl.textContent = timer;
    }, 1000);
  }

  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  document.getElementById("themeSelect").addEventListener("change", startGame);

  startGame();
</script>

</body>
</html>
